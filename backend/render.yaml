services:
  - type: web
    name: daratopup-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SANDBOX_MODE
        value: "true"
      - key: BACKEND_URL
        value: https://daratopup-backend-1.onrender.com
      # IMPORTANT: Set DATABASE_URL in Render dashboard!
      # For SQLite (simple/free): DATABASE_URL=file:./dev.db
      # For PostgreSQL (persistent): DATABASE_URL=postgresql://...
