version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - backend-db:/app/prisma
    environment:
      - PORT=5000
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=change-this-in-production-docker-secret-999
      - SANDBOX_MODE=true
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always

volumes:
  backend-db:
